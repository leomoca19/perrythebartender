<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perrythebartender</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-950 text-slate-100">

    <nav class="fixed w-full z-50 glass-morphism border-b border-white/10">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="#" class="text-2xl font-extrabold tracking-tighter text-white">
                Perry<span class="text-amber-500">thebartender</span>
            </a>

            <div class="hidden md:flex items-center space-x-8 font-medium text-sm uppercase tracking-widest">
                <a href="#contact"
                    class="bg-amber-500 text-slate-950 px-5 py-2 rounded-full hover:bg-amber-400 transition">Book
                    Now</a>
            </div>

            <button class="md:hidden text-2xl p-2" onclick="toggleMenu()">
                <i class="fas fa-bars" id="menu-icon"></i>
            </button>
        </div>

        <div id="mobile-menu"
            class="hidden bg-slate-900/98 p-6 space-y-4 border-b border-white/10 absolute w-full backdrop-blur-xl">
            <a href="#gallery" class="block py-3 border-b border-white/5" onclick="toggleMenu()">Gallery</a>
            <a href="#services" class="block py-3 border-b border-white/5" onclick="toggleMenu()">Services</a>
            <a href="#contact" class="block py-4 text-amber-500 font-bold text-center bg-white/5 rounded-xl"
                onclick="toggleMenu()">BOOK NOW</a>
        </div>
    </nav>

    <section id="gallery" class="relative pt-16">
        <div class="carousel-container group">
            <div id="hero-track" class="carousel-track">
                <img src="assets/img/people/1.jpg" alt="1" class="carousel-slide"
                    onerror="this.src='https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=1920'">
                <img src="assets/img/people/2.jpg" alt="2" class="carousel-slide">
                <img src="assets/img/people/3.jpg" alt="3" class="carousel-slide">
                <img src="assets/img/people/4.jpg" alt="4" class="carousel-slide">
                <img src="assets/img/people/5.jpg" alt="5" class="carousel-slide">
                <img src="assets/img/people/6.jpg" alt="6" class="carousel-slide">
            </div>

            <div
                class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent flex items-end pb-12 md:pb-20 px-6">
                <div class="container mx-auto">
                    <h1 class="text-4xl sm:text-5xl md:text-7xl font-black mb-4 leading-tight break-words">
                        Elevate Your <br><span class="text-amber-500">Private Event</span>
                    </h1>
                    <p class="text-base md:text-xl text-slate-300 max-w-xl mb-8 opacity-90">
                        Premium craft cocktails and professional service delivered to your venue.
                    </p>
                    <div class="flex space-x-4">
                        <button onclick="moveCarousel('hero-track', -1)"
                            class="w-12 h-12 rounded-full border border-white/20 flex items-center justify-center hover:bg-white/10 transition"><i
                                class="fas fa-chevron-left"></i></button>
                        <button onclick="moveCarousel('hero-track', 1)"
                            class="w-12 h-12 rounded-full border border-white/20 flex items-center justify-center hover:bg-white/10 transition"><i
                                class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="reviews" class="py-24 bg-slate-900/50">
        <div class="container mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-center mb-12">
                <div>
                    <h2 class="text-sm uppercase tracking-[0.3em] text-amber-500 font-bold mb-2">Testimonials</h2>
                    <h3 class="text-4xl font-bold">What Clients Say</h3>
                </div>
                <div class="flex space-x-2 mt-6 md:mt-0">
                    <button onclick="moveCarousel('review-track', -1)"
                        class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center hover:bg-amber-500 transition"><i
                            class="fas fa-arrow-left"></i></button>
                    <button onclick="moveCarousel('review-track', 1)"
                        class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center hover:bg-amber-500 transition"><i
                            class="fas fa-arrow-right"></i></button>
                </div>
            </div>

            <div class="carousel-container overflow-hidden">
                <div id="review-track" class="carousel-track">
                    <div class="carousel-item-wrapper min-w-full md:min-w-[50%] lg:min-w-[33.33%] p-4">
                        <div class="glass-morphism p-4 rounded-xl h-full">
                            <img src="assets/img/reviews/1.png" alt="Review 1" class="w-full h-auto rounded-lg"
                                onerror="this.src='https://via.placeholder.com/400x600'">
                        </div>
                    </div>
                    <div class="carousel-item-wrapper min-w-full md:min-w-[50%] lg:min-w-[33.33%] p-4">
                        <div class="glass-morphism p-4 rounded-xl h-full">
                            <img src="assets/img/reviews/2.png" alt="Review 2" class="w-full h-auto rounded-lg">
                        </div>
                    </div>
                    <div class="carousel-item-wrapper min-w-full md:min-w-[50%] lg:min-w-[33.33%] p-4">
                        <div class="glass-morphism p-4 rounded-xl h-full">
                            <img src="assets/img/reviews/3.png" alt="Review 3" class="w-full h-auto rounded-lg">
                        </div>
                    </div>
                    <div class="carousel-item-wrapper min-w-full md:min-w-[50%] lg:min-w-[33.33%] p-4">
                        <div class="glass-morphism p-4 rounded-xl h-full">
                            <img src="assets/img/reviews/4.png" alt="Review 4" class="w-full h-auto rounded-lg">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 border-t border-white/5 text-center text-slate-500 text-sm">
        <p>&copy;
            <script>document.write(new Date().getFullYear())</script> Perrythebartender.
        </p>
        <div class="flex justify-center items-center space-x-6 mt-6 text-2xl">
            <a href="https://www.instagram.com/perrythebartender/" class="hover:text-amber-500 transition"><i
                    class="fab fa-instagram"></i></a>
            <a href="https://www.gigsalad.com/perrythebartender_innisfil" class="hover:opacity-75 transition">
                <img src="assets/img/icons/gigsalad-icon.png" alt="GigSalad" class="w-8 h-8 object-contain">
            </a>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
